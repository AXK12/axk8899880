<script>
// ==================== CORE ENGINE ====================
function calcPage(divisor, numbers) {
  return numbers.map(function(num) {
    if (num === 0) return { num: num, q: 0, r: 0, cp: null };
    var q = Math.floor(divisor / num);
    var r = divisor % num;
    var cp = num - r + q;
    return { num: num, q: q, r: r, cp: cp };
  });
}

function detectCollisions(cpList) {
  var map = {};
  cpList.forEach(function(item, i) {
    if (item.cp === null) return;
    if (!map[item.cp]) map[item.cp] = [];
    map[item.cp].push({ idx: i, num: item.num, q: item.q, r: item.r, cp: item.cp });
  });
  var results = [];
  Object.entries(map).forEach(function(entry) {
    if (entry[1].length >= 2) {
      results.push({ cp: parseInt(entry[0]), entries: entry[1] });
    }
  });
  return results;
}

// ==================== METHOD A: BOOK RULES (书上11规则) ====================
function methodABookRules(entries, maxVal) {
  var preds = new Set();
  var rules = {};

  if (entries.length < 2) return { preds: [], rules: rules };

  var qList = entries.map(function(e) { return e.q; });
  var rList = entries.map(function(e) { return e.r; });
  var cp = entries[0].cp;

  function add(n, rule) {
    if (n >= 1 && n <= maxVal) {
      preds.add(n);
      if (!rules[n]) rules[n] = [];
      if (rules[n].indexOf(rule) === -1) rules[n].push(rule);
    }
  }

  // Rule 1: Q±Q or R±R, CP itself
  for (var i = 0; i < qList.length; i++) {
    for (var j = i + 1; j < qList.length; j++) {
      add(qList[i] + qList[j], '规则1:分子+分子');
      add(Math.abs(qList[i] - qList[j]), '规则1:|分子-分子|');
      add(rList[i] + rList[j], '规则1:分母+分母');
      add(Math.abs(rList[i] - rList[j]), '规则1:|分母-分母|');
    }
  }
  add(cp, '规则1:可比数本身');

  // Rule 2: (Q+Q)±(R+R), composite formulas
  for (var i = 0; i < qList.length; i++) {
    for (var j = i + 1; j < qList.length; j++) {
      var qq = qList[i] + qList[j];
      var rr = rList[i] + rList[j];
      add(qq + rr, '规则2:分子和+分母和');
      add(Math.abs(qq - rr), '规则2:|分子和-分母和|');
      add(qq + rr - cp, '规则2:(分子+分母)和-CP');
      add(Math.abs(qq + rr + cp) <= maxVal ? qq + rr + cp : Math.abs(qq + rr - cp), '规则2:复合');
    }
  }

  // Rule 3: Cross-pattern a/c/d and b/d/c
  for (var i = 0; i < entries.length; i++) {
    for (var j = i + 1; j < entries.length; j++) {
      if (entries[i].q === entries[j].r && entries[i].r === entries[j].q) {
        var c = entries[i].q;
        var d = entries[j].q;
        add(c, '规则3:交叉c');
        add(d, '规则3:交叉d');
        add(c + d, '规则3:c+d');
        add(Math.abs(c - d), '规则3:|c-d|');
      }
    }
  }

  // Rule 4: a/b/b form (q == r)
  entries.forEach(function(e) {
    if (e.q === e.r) {
      add(e.num, '规则4:a(原始数)');
      add(e.q, '规则4:b');
      add(e.q + e.q, '规则4:b+b');
      add(e.num + e.q, '规则4:a+b');
      add(Math.abs(e.num - e.q), '规则4:|a-b|');
    }
  });

  // Rule 7: All R=0 → Q values have 90% chance
  if (rList.every(function(r) { return r === 0; })) {
    qList.forEach(function(q) { add(q, '规则7:分母全0→分子(90%)'); });
  }

  // Additional: cross Q-R operations across all collision pairs
  var sumQ = qList.reduce(function(a, b) { return a + b; }, 0);
  var sumR = rList.reduce(function(a, b) { return a + b; }, 0);
  add(sumQ, '总分子');
  add(sumR, '总分母');
  add(sumQ + sumR, 'Σ分子+Σ分母');
  add(Math.abs(sumQ - sumR), '|Σ分子-Σ分母|');
  add(sumQ + sumR - cp, 'Σ-CP');

  // Cross Q*R operations
  for (var i = 0; i < qList.length; i++) {
    for (var j = i + 1; j < qList.length; j++) {
      add(qList[i] + rList[j], '分子+分母交叉');
      add(rList[i] + qList[j], '分母+分子交叉');
      add(Math.abs(qList[i] - rList[j]), '|分子-分母|交叉');
      add(Math.abs(rList[i] - qList[j]), '|分母-分子|交叉');
    }
  }

  return { preds: Array.from(preds).sort(function(a, b) { return a - b; }), rules: rules };
}

// ==================== METHOD B: Q-R ARITHMETIC ENGINE ====================
function methodBQREngine(entries, maxVal) {
  var preds = new Set();

  if (entries.length < 2) return [];

  var qList = entries.map(function(e) { return e.q; });
  var rList = entries.map(function(e) { return e.r; });
  var cp = entries[0].cp;

  function add(n) {
    var v = Math.round(n);
    if (v >= 1 && v <= maxVal) preds.add(v);
  }

  for (var i = 0; i < qList.length; i++) {
    for (var j = i + 1; j < qList.length; j++) {
      add(qList[i] + qList[j]);
      add(Math.abs(qList[i] - qList[j]));
      add(rList[i] + rList[j]);
      add(Math.abs(rList[i] - rList[j]));
    }
  }

  for (var i = 0; i < qList.length; i++) {
    for (var j = i + 1; j < qList.length; j++) {
      var s = qList[i] + qList[j];
      var d = rList[i] + rList[j];
      add(s + d);
      add(Math.abs(s - d));
      add(s + d - entries[0].r);
      add(qList[i] + rList[j]);
      add(Math.abs(qList[i] - rList[j]));
      add(rList[i] + qList[j]);
      add(Math.abs(rList[i] - qList[j]));
    }
  }

  if (rList.every(function(r) { return r === 0; })) {
    qList.forEach(function(q) { add(q); });
  }

  add(cp);
  var sumQR = qList.reduce(function(a, b) { return a + b; }, 0) + rList.reduce(function(a, b) { return a + b; }, 0);
  add(sumQR - cp);
  add(sumQR + cp);

  return Array.from(preds).sort(function(a, b) { return a - b; });
}

// ==================== MAIN PREDICTOR ====================
function predict(front, back, isSSQ, bluePrev2, blueHistory) {
  var allNums = front.concat(back);
  var total = allNums.reduce(function(a, b) { return a + b; }, 0);
  var maxVal = isSSQ ? 33 : 35;
  var backMax = isSSQ ? 16 : 12;

  var divisors, pageCount, pageNames;
  if (isSSQ) {
    divisors = [total].concat(front.map(function(f) { return total - f; }));
    pageCount = 7;
    pageNames = ['总和页', '减红1', '减红2', '减红3', '减红4', '减红5', '减红6'];
  } else {
    divisors = [total].concat(
      front.map(function(f) { return total - f; }),
      back.map(function(b) { return total - b; })
    );
    pageCount = 8;
    pageNames = ['总和页', '减前1', '减前2', '减前3', '减前4', '减前5', '减后1', '减后2'];
  }

  var frontPredsA = new Set();
  var frontPredsB = new Set();
  var backPredsA = new Set();
  var backPredsB = new Set();
  var allRules = {};
  var crashCount = 0;
  var pageDetails = [];

  for (var pi = 0; pi < pageCount; pi++) {
    var res = calcPage(divisors[pi], allNums);
    var frontLen = isSSQ ? 6 : 5;
    var fRes = res.slice(0, frontLen);
    var bRes = res.slice(frontLen);

    var fColl = detectCollisions(fRes);
    var bColl = [];
    if (!isSSQ && pi >= 6) bColl = detectCollisions(bRes);

    var pageCrash = false;
    var info = '';

    fColl.forEach(function(col) {
      pageCrash = true;

      var aRes = methodABookRules(col.entries, maxVal);
      aRes.preds.forEach(function(v) {
        frontPredsA.add(v);
        if (aRes.rules[v]) {
          if (!allRules[v]) allRules[v] = [];
          allRules[v] = allRules[v].concat(aRes.rules[v]);
        }
      });

      methodBQREngine(col.entries, maxVal).forEach(function(v) {
        frontPredsB.add(v);
      });

      info += (info ? ' | ' : '') + 'CP=' + col.cp + '(' + col.entries.map(function(e) { return e.num; }).join('+') + ')';
    });

    bColl.forEach(function(col) {
      pageCrash = true;
      var aRes = methodABookRules(col.entries, backMax);
      aRes.preds.forEach(function(v) {
        backPredsA.add(v);
        if (aRes.rules[v]) {
          if (!allRules[v]) allRules[v] = [];
          allRules[v] = allRules[v].concat(aRes.rules[v]);
        }
      });
      methodBQREngine(col.entries, backMax).forEach(function(v) {
        backPredsB.add(v);
      });
      info += (info ? ' ' : '') + '后区:CP=' + col.cp + '(' + col.entries.map(function(e) { return e.num; }).join('+') + ')';
    });

    if (pageCrash) crashCount++;
    pageDetails.push({ name: pageNames[pi], divisor: divisors[pi], crash: pageCrash, info: info, fColl: fColl, bColl: bColl });
  }

  // Home page special rules (Rule 5, 8, 11)
  var homePage = pageDetails[0];
  if (homePage && homePage.fColl.length > 0) {
    var homeRes = calcPage(divisors[0], allNums);
    var frontLen = isSSQ ? 6 : 5;
    var homeFR = homeRes.slice(0, frontLen);

    // Rule 5: Home page, Q == CP → 80% chance
    homePage.fColl.forEach(function(col) {
      col.entries.forEach(function(e) {
        if (e.q === col.cp) {
          frontPredsA.add(col.cp);
          if (!allRules[col.cp]) allRules[col.cp] = [];
          if (allRules[col.cp].indexOf('规则5:首页分子=可比数(80%)') === -1) {
            allRules[col.cp].push('规则5:首页分子=可比数(80%)');
          }
        }
      });
    });

    // Rule 8: Home page, same Q+R → 80% chance
    var qrMap = {};
    homeFR.forEach(function(e) {
      var qr = e.q + e.r;
      if (!qrMap[qr]) qrMap[qr] = [];
      qrMap[qr].push(e);
    });
    Object.entries(qrMap).forEach(function(entry) {
      var qr = parseInt(entry[0]);
      var items = entry[1];
      if (items.length >= 2 && qr >= 1 && qr <= maxVal) {
        frontPredsA.add(qr);
        if (!allRules[qr]) allRules[qr] = [];
        if (allRules[qr].indexOf('规则8:首页分子+分母相同(80%)') === -1) {
          allRules[qr].push('规则8:首页分子+分母相同(80%)');
        }
      }
    });

    // Rule 11: Sum of remainders on home page < maxVal → appears
    var sumR = homeFR.reduce(function(s, e) { return s + e.r; }, 0);
    if (sumR >= 1 && sumR <= maxVal) {
      frontPredsA.add(sumR);
      if (!allRules[sumR]) allRules[sumR] = [];
      if (allRules[sumR].indexOf('规则11:首页余数和') === -1) {
        allRules[sumR].push('规则11:首页余数和');
      }
    }
  }

  // Blue/back predictions
  var bluePreds = [];
  var blueClassify = null;
  if (isSSQ && back.length > 0) {
    var methodBBlues = new Set();
    for (var pi = 0; pi < pageCount; pi++) {
      var fres = calcPage(divisors[pi], allNums);
      var fColl = detectCollisions(fres);
      fColl.forEach(function(col) {
        methodBQREngine(col.entries, 16).forEach(function(v) { methodBBlues.add(v); });
      });
    }
    bluePreds = Array.from(methodBBlues).sort(function(a, b) { return a - b; });
  }

  var blueFilter = null;
  if (isSSQ && bluePreds.length > 0 && (bluePrev2 !== null || !!blueHistory)) {
    blueFilter = filterBlues(bluePreds, back[0], bluePrev2, blueHistory);
  }

  // 天平支点杀红（仅双色球）：上期蓝球 = 天平支点，下期红球排除此号
  var pivotKill = null;
  if (isSSQ && back.length > 0) {
    pivotKill = back[0];
  }

  var frontAP = Array.from(frontPredsA).sort(function(a, b) { return a - b; });
  var frontBP = Array.from(frontPredsB).sort(function(a, b) { return a - b; });

  return {
    front_a: frontAP,
    front_b: frontBP,
    back_a: Array.from(backPredsA).sort(function(a, b) { return a - b; }),
    back_b: Array.from(backPredsB).sort(function(a, b) { return a - b; }),
    front_consensus: frontAP.filter(function(x) { return frontPredsB.has(x); }),
    back_consensus: Array.from(backPredsA).filter(function(x) { return backPredsB.has(x); }).sort(function(a, b) { return a - b; }),
    a_only: frontAP.filter(function(x) { return !frontPredsB.has(x); }),
    b_only: frontBP.filter(function(x) { return !frontPredsA.has(x); }),
    blue_preds: bluePreds,
    blue_filter: blueFilter,
    pivot_kill: pivotKill,
    crash_pages: crashCount,
    has_crash: crashCount > 0,
    page_details: pageDetails,
    all_rules: allRules,
  };
}

// ==================== BLUE BALL CLASSIFICATION & FILTER ====================
function isBlueAdjacent(a, b) {
  var d = Math.abs(a - b);
  return d === 1 || d === 15;
}

function classifyBlue(n, prevBlue, prev2Blue, freq) {
  // 邻孤传: 传=同上期, 邻=上期±1, 孤=其余
  var lgc;
  if (n === prevBlue) lgc = '传';
  else if (isBlueAdjacent(n, prevBlue)) lgc = '邻';
  else lgc = '孤';

  // 复隔中: 复=同上期, 隔=同上上期(≠上期), 中=其余
  var fgz;
  if (n === prevBlue) fgz = '复';
  else if (prev2Blue !== null && n === prev2Blue && n !== prevBlue) fgz = '隔';
  else fgz = '中';

  // 重斜跳: 重=同上期, 斜=上上期±1, 跳=其余
  var zxt;
  if (n === prevBlue) zxt = '重';
  else if (prev2Blue !== null && isBlueAdjacent(n, prev2Blue)) zxt = '斜';
  else zxt = '跳';

  // 冷温热: >2=热, =2=温, <2=冷
  var cnt = freq[n] || 0;
  var lwr = cnt > 2 ? '热' : (cnt === 2 ? '温' : '冷');

  return { lgc: lgc, fgz: fgz, zxt: zxt, lwr: lwr };
}

function filterBlues(bluePool, prevBlue, prev2Blue, historyBlues) {
  var freq = {};
  if (historyBlues && historyBlues.length > 0) {
    historyBlues.forEach(function(b) { freq[b] = (freq[b] || 0) + 1; });
  } else {
    for (var i = 1; i <= 16; i++) freq[i] = 0;
  }

  var filtered = [];
  var classified = [];
  var tags = {};

  bluePool.forEach(function(b) {
    var c = classifyBlue(b, prevBlue, prev2Blue, freq);
    classified.push({ num: b, cls: c });
    if (c.lgc === '孤' && c.fgz === '中' && c.zxt === '跳' && c.lwr === '冷') {
      filtered.push(b);
      tags[b] = c.lgc + ' ' + c.fgz + ' ' + c.zxt + ' ' + c.lwr;
    }
  });

  return {
    all: bluePool,
    classified: classified,
    filtered: filtered,
    tags: tags,
    has_filter: prev2Blue !== null || (historyBlues && historyBlues.length > 0)
  };
}

// ==================== GEN COMBOS ====================
function genCombos(pool, pool2, cnt, size1, size2) {
  if (pool.length < size1) return [];
  var combos = [];
  var seeds = [42, 123, 777, 999, 555];
  for (var si = 0; si < Math.min(cnt, seeds.length); si++) {
    var s = pool.slice();
    for (var i = s.length - 1; i > 0; i--) {
      var j = Math.floor((seeds[si] * (i + 1) + si * 13) % (i + 1));
      var tmp = s[i]; s[i] = s[j]; s[j] = tmp;
    }
    var f = s.slice(0, size1).sort(function(a, b) { return a - b; });
    var sc = pool2.slice();
    for (var k = sc.length - 1; k > 0; k--) {
      var j2 = Math.floor((seeds[si] * (k + 1) + si * 37) % (k + 1));
      var tmp2 = sc[k]; sc[k] = sc[j2]; sc[j2] = tmp2;
    }
    var bk = sc.slice(0, size2).sort(function(a, b) { return a - b; });
    combos.push([f, bk]);
  }
  return combos;
}

// ==================== PREDICT FUNCTIONS ====================
function getInputs(cls, max, min) {
  var vals = [];
  document.querySelectorAll('.' + cls).forEach(function(inp) {
    var v = parseInt(inp.value);
    if (isNaN(v) || v < min || v > max) {
      inp.classList.add('error');
      setTimeout(function() { inp.classList.remove('error'); }, 1000);
      vals.push(null);
      return;
    }
    vals.push(v);
  });
  if (vals.length === 0) return null;
  var filtered = vals.filter(function(v) { return v !== null; });
  if (filtered.length !== vals.length) return null;
  var uniq = {};
  for (var i = 0; i < filtered.length; i++) {
    if (uniq[filtered[i]]) return null;
    uniq[filtered[i]] = true;
  }
  return filtered;
}

function predictDLT() {
  var front = getInputs('dlt-f', 35, 1);
  var back = getInputs('dlt-b', 12, 1);
  if (!front || !back || front.length !== 5 || back.length !== 2) {
    alert('请正确输入5个前区(1-35)和2个后区(1-12)，号码不能重复');
    return;
  }
  var result = predict(front, back, false, null, null);
  renderResult('dlt-result', 'dlt-result-inner', result, 35, 12, false);
}

function predictSSQ() {
  var front = getInputs('ssq-f', 33, 1);
  var blueInp = document.getElementById('ssq-blue');
  var blue = parseInt(blueInp.value);
  if (!front || front.length !== 6 || isNaN(blue) || blue < 1 || blue > 16) {
    if (isNaN(blue) || blue < 1 || blue > 16) {
      blueInp.classList.add('error');
      setTimeout(function() { blueInp.classList.remove('error'); }, 1000);
    }
    alert('请正确输入6个红球(1-33)和1个蓝球(1-16),红球不能重复');
    return;
  }

  // Blue filter params
  var bluePrev2Inp = document.getElementById('ssq-blue-prev2');
  var bluePrev2 = null;
  var pv2 = parseInt(bluePrev2Inp.value);
  if (!isNaN(pv2) && pv2 >= 1 && pv2 <= 16) bluePrev2 = pv2;

  var histInp = document.getElementById('ssq-blue-history');
  var hist = null;
  if (histInp.value.trim()) {
    hist = histInp.value.split(/[,,\s]+/).map(function(x) { return parseInt(x); }).filter(function(x) { return x >= 1 && x <= 16; });
  }

  var result = predict(front, [blue], true, bluePrev2, hist);
  renderResult('ssq-result', 'ssq-result-inner', result, 33, 16, true);
}

      var inputs = parent.querySelectorAll('input');
      var idx = Array.from(inputs).indexOf(this);
      if (idx < inputs.length - 1) inputs[idx + 1].focus();
    }
    this.classList.remove('error');
  });
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Backspace' && this.value.length === 0) {
      var parent = this.parentElement;
      var inputs = parent.querySelectorAll('input');
      var idx = Array.from(inputs).indexOf(this);
      if (idx > 0) inputs[idx - 1].focus();
    }
  });
});

// Blue ball history preset (recent SSQ data)
var BLUE_HISTORY_PRESET = [

];
function loadBluePreset() {
  var histInp = document.getElementById('ssq-blue-history');
  var pv2Inp = document.getElementById('ssq-blue-prev2');
  
  // Last 11 periods
  var recent11 = BLUE_HISTORY_PRESET.slice(-11);
  histInp.value = recent11.join(', ');
  
  // prev2 = 2nd last
  if (BLUE_HISTORY_PRESET.length >= 2) {
    pv2Inp.value = BLUE_HISTORY_PRESET[BLUE_HISTORY_PRESET.length - 2];
  }
  
  var btn = document.getElementById('blue-preset-btn');
  btn.textContent = '✅ 已加载预设 (' + recent11.length + '期)';
  btn.style.background = '#1a3a20';
  btn.style.color = '#27ae60';
}
