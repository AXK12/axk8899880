name: 每日更新开奖数据 (22:15 CST)
on:
  schedule:
    - cron: '15 14 * * *'   # 每天 UTC 14:15 = 北京时间 22:15
  workflow_dispatch:       # 支持手动触发

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 抓取最新开奖数据
        run: python fetch_data.py
      - name: 提交更新
        run: |
          git config user.name "lottery-bot"
          git config user.email "bot@axk12.github.io"
          git add data/
          git diff --staged --quiet || git commit -m "📊 自动更新开奖数据 $(date +'%Y-%m-%d')"
          git push
